<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#f6f6f6;}

/* NAVBAR */
.navbar{
    padding:18px 60px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
}

.logo{
    font-weight:600;
    font-size:18px;
}

.nav a{
    margin-left:25px;
    text-decoration:none;
    color:#555;
    font-size:14px;
}

.nav a.active{
    color:black;
    font-weight:600;
    border-bottom:2px solid black;
    padding-bottom:2px;
}

/* PROFILE HEADER */
.profile{
    padding:40px 60px;
}

.profile h1{
    font-size:28px;
}

.profile p{
    color:#666;
    margin-top:5px;
}

/* GRID */
.grid{
    padding:20px 60px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    position:relative;
    background:white;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #eee;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

/* OVERLAY */
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:160px;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:0.3s;
}

.card:hover .overlay{
    opacity:1;
}

.overlay button{
    padding:8px 15px;
    background:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.card h3{
    padding:10px;
}

.card p{
    padding:0 10px 10px;
    font-size:13px;
    color:#666;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">SkillShare</div>

    <div class="nav">
        <a href="explore.html">Explore</a>
        <a href="upload.html">Upload</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<!-- PROFILE INFO -->
<div class="profile">
    <h1 id="username">User</h1>
    <p>Your uploaded tutorials</p>
</div>

<!-- USER TUTORIALS -->
<div class="grid" id="list"></div>

<script>

/* USER NAME */
document.getElementById("username").innerText =
localStorage.getItem("user") || "User";

/* GET YOUTUBE ID */
function getId(url){
    if(!url) return "";
    if(url.includes("watch?v=")) return url.split("watch?v=")[1];
    if(url.includes("youtu.be/")) return url.split("youtu.be/")[1];
    return "";
}

/* LOAD USER DATA */
let data = JSON.parse(localStorage.getItem("tutorials")) || [];

let html="";

if(data.length === 0){
    html = "<p style='padding:60px;'>No tutorials uploaded yet.</p>";
}else{

data.slice().reverse().forEach(d=>{
    html += `
    <div class="card">

        <img src="https://img.youtube.com/vi/${getId(d.video)}/hqdefault.jpg">

        <div class="overlay">
            <button onclick="openPage('${d.title}')">View</button>
        </div>

        <h3>${d.title}</h3>
        <p>${d.cat}</p>

    </div>`;
});
}

document.getElementById("list").innerHTML = html;

/* OPEN */
function openPage(title){
    localStorage.setItem("tutorial",title);
    window.location="tutorial.html";
}

</script>

</body>
</html>
