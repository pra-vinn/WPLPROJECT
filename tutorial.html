<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#f6f6f6;}

/* NAVBAR */
.navbar{
    padding:18px 60px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
}

.logo{
    font-weight:600;
    font-size:18px;
}

.nav a{
    margin-left:25px;
    text-decoration:none;
    color:#555;
    font-size:14px;
}

.nav a.active{
    color:black;
    font-weight:600;
    border-bottom:2px solid black;
    padding-bottom:2px;
}

/* CONTAINER */
.container{
    padding:40px 60px;
    max-width:900px;
    margin:auto;
}

/* VIDEO */
.video iframe{
    width:100%;
    height:450px;
    border-radius:10px;
    border:none;
}

/* INFO */
.info{
    margin-top:20px;
}

.info h1{
    font-size:24px;
}

.info p{
    color:#666;
    margin-top:5px;
}

/* COMMENTS */
.comments{
    margin-top:40px;
}

.comments h2{
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:10px;
}

button{
    padding:10px 20px;
    background:#111;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.comment{
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #eee;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">SkillShare</div>

    <div class="nav">
        <a href="explore.html" class="active">Explore</a>
        <a href="upload.html">Upload</a>
        <a href="profile.html">Profile</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<div class="container">

<!-- VIDEO -->
<div class="video">
    <iframe id="player" src="" allowfullscreen></iframe>
</div>

<!-- INFO -->
<div class="info">
    <h1 id="title"></h1>
    <p id="category"></p>
</div>

<!-- COMMENTS -->
<div class="comments">
    <h2>Comments</h2>

    <input id="input" placeholder="Write a comment">
    <button onclick="addComment()">Post</button>

    <div id="commentList"></div>
</div>

</div>

<script>

/* GET VIDEO ID */
function getId(url){
    if(!url) return "";
    if(url.includes("watch?v=")) return url.split("watch?v=")[1];
    if(url.includes("youtu.be/")) return url.split("youtu.be/")[1];
    return "";
}

/* LOAD TUTORIAL */
let title = localStorage.getItem("tutorial");

let data = JSON.parse(localStorage.getItem("tutorials")) || [];

let tutorial = data.find(t => t.title === title);

/* DEFAULT FALLBACK */
if(!tutorial){
    tutorial = {
        title:"Demo Video",
        cat:"General",
        video:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    };
}

/* SET DATA */
document.getElementById("title").innerText = tutorial.title;
document.getElementById("category").innerText = tutorial.cat;

document.getElementById("player").src =
"https://www.youtube.com/embed/" + getId(tutorial.video);


/* COMMENTS STORAGE KEY */
let key = "comments_" + tutorial.title;

/* LOAD COMMENTS */
function loadComments(){
    let comments = JSON.parse(localStorage.getItem(key)) || [];

    let html = "";

    comments.forEach(c=>{
        html += `<div class="comment">${c}</div>`;
    });

    document.getElementById("commentList").innerHTML = html;
}

/* ADD COMMENT */
function addComment(){

    let val = document.getElementById("input").value.trim();

    if(val==="") return;

    let comments = JSON.parse(localStorage.getItem(key)) || [];

    comments.push(val);

    localStorage.setItem(key, JSON.stringify(comments));

    document.getElementById("input").value = "";

    loadComments();
}

/* INIT */
loadComments();

</script>

</body>
</html>
