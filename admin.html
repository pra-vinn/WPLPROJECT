<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
    background:#f5f5f5;
}

/* NAVBAR */
.navbar{
    padding:18px 60px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
}

.logo{
    font-weight:600;
    font-size:18px;
}

.nav a{
    margin-left:25px;
    text-decoration:none;
    color:#555;
    font-size:14px;
}

.nav a.active{
    color:black;
    font-weight:600;
    border-bottom:2px solid black;
    padding-bottom:2px;
}

/* CONTAINER */
.container{
    padding:40px 60px;
}

/* STATS */
.stats{
    display:flex;
    gap:20px;
    margin-bottom:40px;
}

.stat{
    flex:1;
    background:white;
    padding:20px;
    border-radius:10px;
    border:1px solid #eee;
}

.stat h3{
    margin-bottom:8px;
    font-size:14px;
    color:#666;
}

.stat p{
    font-size:28px;
    font-weight:600;
}

/* TABLE */
table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:30px;
}

th, td{
    padding:15px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

th{
    background:#fafafa;
    font-weight:600;
}

/* BUTTON */
button{
    padding:6px 12px;
    border:none;
    background:#111;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:13px;
}

button:hover{
    background:#333;
}

h3.section-title{
    margin-bottom:12px;
    font-size:16px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">SkillShare</div>

    <div class="nav">
        <a href="admin.html" class="active">Admin Panel</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<div class="container">

<!-- STATS -->
<div class="stats">
    <div class="stat">
        <h3>Total Users</h3>
        <p id="users">3</p>
    </div>

    <div class="stat">
        <h3>Total Tutorials</h3>
        <p id="tutorials">4</p>
    </div>
</div>

<!-- USERS TABLE -->
<h3 class="section-title">Users</h3>

<table>
<tr>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
</tr>

<tr>
    <td>user1@mail.com</td>
    <td>User</td>
    <td><button onclick="removeRow(this)">Remove</button></td>
</tr>

<tr>
    <td>admin@mail.com</td>
    <td>Admin</td>
    <td><button onclick="removeRow(this)">Remove</button></td>
</tr>

</table>

<!-- TUTORIALS TABLE -->
<h3 class="section-title">Tutorials</h3>

<table>
<tr>
    <th>Title</th>
    <th>Category</th>
    <th>Action</th>
</tr>

<tr>
    <td>Java Basics</td>
    <td>Coding</td>
    <td><button onclick="removeRow(this)">Delete</button></td>
</tr>

<tr>
    <td>Quick Pasta</td>
    <td>Cooking</td>
    <td><button onclick="removeRow(this)">Delete</button></td>
</tr>

</table>

</div>

<script>

function removeRow(btn){
    btn.parentElement.parentElement.remove();
}

</script>

</body>
</html>
