<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Tutorial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#f6f6f6;}

/* NAVBAR */
.navbar{
    padding:18px 60px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
}

.logo{
    font-weight:600;
    font-size:18px;
}

.nav a{
    margin-left:25px;
    text-decoration:none;
    color:#555;
    font-size:14px;
}

.nav a.active{
    color:black;
    font-weight:600;
    border-bottom:2px solid black;
    padding-bottom:2px;
}

/* FORM */
.container{
    padding:60px;
    display:flex;
    justify-content:center;
}

.box{
    background:white;
    padding:30px;
    width:400px;
    border-radius:12px;
    border:1px solid #eee;
}

.box h2{
    margin-bottom:10px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#111;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* PREVIEW */
.preview{
    width:100%;
    height:160px;
    border-radius:10px;
    margin-top:10px;
    object-fit:cover;
    background:#ddd;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">SkillShare</div>

    <div class="nav">
        <a href="explore.html">Explore</a>
        <a href="upload.html" class="active">Upload</a>
        <a href="profile.html">Profile</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<div class="container">

<div class="box">

<h2>Upload Tutorial</h2>

<input id="title" placeholder="Title">

<select id="category">
    <option>Coding</option>
    <option>Fitness</option>
    <option>Cooking</option>
</select>

<textarea id="desc" placeholder="Description"></textarea>

<input id="video" placeholder="YouTube Video URL">

<img id="preview" class="preview">

<button onclick="save()">Upload</button>

</div>

</div>

<script>

/* EXTRACT YOUTUBE THUMBNAIL */
document.getElementById("video").oninput = function(){

    let url = this.value;
    let id = "";

    if(url.includes("watch?v=")){
        id = url.split("watch?v=")[1];
    }else if(url.includes("youtu.be/")){
        id = url.split("youtu.be/")[1];
    }

    if(id){
        document.getElementById("preview").src =
        "https://img.youtube.com/vi/" + id + "/hqdefault.jpg";
    }
};

/* SAVE FUNCTION */
function save(){

    let title    = document.getElementById("title").value.trim();
    let category = document.getElementById("category").value;
    let desc     = document.getElementById("desc").value.trim();
    let video    = document.getElementById("video").value.trim();

    if(title==="" || desc==="" || video===""){
        alert("Please fill all fields.");
        return;
    }

    let data = JSON.parse(localStorage.getItem("tutorials")) || [];

    data.push({
        title: title,
        cat: category,
        desc: desc,
        video: video
    });

    localStorage.setItem("tutorials", JSON.stringify(data));

    alert("Uploaded successfully!");

    window.location = "explore.html";
}

</script>

</body>
</html>
